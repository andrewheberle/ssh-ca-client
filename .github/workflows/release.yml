name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  client:
    name: Build Client with GoReleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
          cache: true
      - name: Generate code with go generate
        run: |
          go generate ./...
          git diff --exit-code -- . || (echo "Generated code is out of date. Please run 'go generate ./...' and commit the changes." && exit 1)
      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - name: Install Snapcraft
        uses: samuelmeuli/action-snapcraft@fceeb3c308e76f3487e72ef608618de625fb7fe8 # v3.0.1
      - name: Release with GoReleaser
        uses: goreleaser/goreleaser-action@e24998b8b67b290c2fa8b7c14fcfa7de2c5c9b8c # v7.1.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Attest build artifacts
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: ./dist/checksums.txt
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-artifact
          path: dist
          retention-days: 1

  snapcraft:
    name: Publish Snap
    runs-on: ubuntu-latest
    needs: client
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-artifact
          path: dist
      - name: Install Snapcraft and Log In
        uses: samuelmeuli/action-snapcraft@fceeb3c308e76f3487e72ef608618de625fb7fe8 # v3.0.1
      - name: Upload to Snap Store
        run: find dist -name *.snap -exec snapcraft upload {} --release=stable \;
        env:
          TERM: dumb
    env:
      SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}

  msi:
    name: Package as an MSI for Windows
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    needs: client
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-artifact
          path: dist
      - name: Add WiX Toolset to path
        run: Write-Output $env:WIX | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Set release version
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          "INSTALLER_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Convert LICENSE to RTF
        run: |
          $text = Get-Content -Path "LICENSE" -Raw
          $escaped = $text `
            -replace '\\', '\\\\' `
            -replace '\{', '\{' `
            -replace '\}', '\}' `
            -replace '\r\n|\r|\n', '\line '
          $rtf = "{\rtf1\ansi\deff0 {\fonttbl {\f0 Courier New;}} \f0\fs18 " + $escaped + "}"
          [System.IO.File]::WriteAllText("LICENSE.rtf", $rtf, [System.Text.Encoding]::ASCII)
      - name: Build MSI
        run: |
          $msiPath = ".\dist\ssh-ca-client_${env:INSTALLER_VERSION}_amd64.msi"

          candle.exe -arch x64 `
            -ext WixUIExtension `
            -ext WixUtilExtension `
            templates\product.wxs templates\ui.wxs templates\options_dialog.wxs `
            -o tmp\

          light.exe `
            -ext WixUIExtension `
            -ext WixUtilExtension `
            tmp\product.wixobj tmp\ui.wixobj tmp\options_dialog.wixobj `
            -o $msiPath

          $hash = (Get-FileHash -Algorithm SHA256 -Path $msiPath).Hash
          "$hash ssh-ca-client_${env:INSTALLER_VERSION}_amd64.msi" | Out-File -FilePath ".\dist\ssh-ca-client.sha256sum"
      - name: Attest MSI
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: ./dist/ssh-ca-client.sha256sum
      - name: Upload MSI as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: msi-artifact
          path: dist/**/*.msi
          retention-days: 1
      - name: Add MSI to Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            dist/*.msi
            dist/*.sha256sum

  repo:
    name: Publish to APT repository
    runs-on: ubuntu-latest
    needs: client
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-artifact
          path: dist
      - name: Import GPG key
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
      - name: Setup deb-s3
        run: |
          sudo wget -O /etc/apt/trusted.gpg.d/deb-s3-keyring.asc https://deb-s3.github.io/deb-s3/gpg.key
          echo "deb https://deb-s3.github.io/deb-s3 deb-s3 main" | sudo tee /etc/apt/sources.list.d/deb-s3.list
          sudo apt-get update
          sudo apt-get install deb-s3
      - name: Upload .deb packages to repo
        run: |
          find dist -name '*.deb' | xargs -I{} deb-s3 upload \
            --bucket packages \
            --s3-region auto \
            --endpoint https://${{ vars.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --access-key-id ${{ secrets.R2_ACCESS_KEY_ID }} \
            --secret-access-key ${{ secrets.R2_SECRET_ACCESS_KEY }} \
            --sign C725E94C4DAFEA05 \
            --codename stable \
            --component main \
            --prefix ssh-ca-client \
            --visibility nil \
            {}
        env:
          # R2 does not support CRC32 checksums introduced in AWS SDK
          # https://github.com/aws/aws-sdk-ruby/issues/3166
          AWS_REQUEST_CHECKSUM_CALCULATION: WHEN_REQUIRED
      - name: Upload public key to apt repo
        run: |
          gpg --armor --export C725E94C4DAFEA05 > pubkey.gpg
          aws s3 cp pubkey.gpg s3://packages/ssh-ca-client/pubkey.gpg \
            --endpoint-url https://${{ vars.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --region auto
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
