name: Build

on:
  push:
    branches:
      - 'main'
  pull_request:

permissions: {}

jobs:
  client:
    name: Build Client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
          cache: true
      - name: Generate code with go generate
        run: |
          go generate ./...
          git diff --exit-code -- . || (echo "Generated code is out of date. Please run 'go generate ./...' and commit the changes." && exit 1)
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - name: Install Snapcraft
        uses: samuelmeuli/action-snapcraft@fceeb3c308e76f3487e72ef608618de625fb7fe8 # v3.0.1
      - name: Build snapshot with GoReleaser
        uses: goreleaser/goreleaser-action@e24998b8b67b290c2fa8b7c14fcfa7de2c5c9b8c # v7.1.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --snapshot --skip sign
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-artifact
          path: dist
          retention-days: 1
  snapcraft:
    name: Publish Snap
    runs-on: ubuntu-latest
    needs: client
    if: ${{ github.event_name == 'push' }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-artifact
          path: dist
      - name: Install Snapcraft and Log In
        uses: samuelmeuli/action-snapcraft@fceeb3c308e76f3487e72ef608618de625fb7fe8 # v3.0.1
      - name: Upload to Snap Store
        run: find dist -name *.snap -exec snapcraft upload {} --release=edge \;
        env:
          TERM: dumb
    env:
      SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}

  msi:
    name: Package as an MSI for Windows
    runs-on: windows-latest
    needs: client
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-artifact
          path: dist
      - name: Add WiX Toolset to path
        run: Write-Output $env:WIX | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Set non-release version
        run: |
          $lastTag = git describe --tags --abbrev=0
          $version = $lastTag -replace '^v', ''
          "INSTALLER_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Convert LICENSE to RTF
        run: |
          $text = Get-Content -Path "LICENSE" -Raw
          $escaped = $text `
            -replace '\\', '\\\\' `
            -replace '\{', '\{' `
            -replace '\}', '\}' `
            -replace '\r\n|\r|\n', '\line '
          $rtf = "{\rtf1\ansi\deff0 {\fonttbl {\f0 Courier New;}} \f0\fs18 " + $escaped + "}"
          [System.IO.File]::WriteAllText("LICENSE.rtf", $rtf, [System.Text.Encoding]::ASCII)
      - name: Build MSI
        run: |
          $msiPath = ".\dist\ssh-ca-client_${env:INSTALLER_VERSION}_amd64.msi"

          candle.exe -arch x64 `
            -ext WixUIExtension `
            -ext WixUtilExtension `
            -dINSTALLER_VERSION=${env:INSTALLER_VERSION} `
            templates\product.wxs templates\ui.wxs templates\options_dialog.wxs `
            -o tmp\

          light.exe `
            -ext WixUIExtension `
            -ext WixUtilExtension `
            tmp\product.wixobj tmp\ui.wixobj tmp\options_dialog.wixobj `
            -o $msiPath

          $hash = (Get-FileHash -Algorithm SHA256 -Path $msiPath).Hash
          "$hash ssh-ca-client_${env:INSTALLER_VERSION}_amd64.msi" | Out-File -FilePath ".\dist\ssh-ca-client.sha256sum"
      - name: Upload MSI as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: msi-artifact
          path: dist/**/*.msi
          retention-days: 1
